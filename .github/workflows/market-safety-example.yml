# Example: Using the Headless Oracle Market Safety Check Action
#
# Add this to your trading or financial workflow to verify market state
# before deploying code or executing automated operations.
#
# The action fails on HALTED or UNKNOWN (fail-closed).
# CLOSED passes by default (set allow_closed: false to also fail on CLOSED).

name: Market Safety Gate (Example)

on:
  workflow_dispatch:
  schedule:
    # Run at NYSE open (14:30 UTC on weekdays — adjusts automatically for DST)
    - cron: '30 14 * * 1-5'

jobs:
  check-market:
    runs-on: ubuntu-latest
    name: Verify NYSE is open before trading operations

    steps:
      - name: Check NYSE market status
        id: oracle
        uses: LembaGang/headless-oracle-agent-demo@v1
        with:
          mic: XNYS
          allow_closed: false              # fail if market is CLOSED
          api_key: ${{ secrets.HEADLESS_ORACLE_API_KEY }}   # optional

      # Outputs are available for downstream steps
      - name: Show oracle result
        run: |
          echo "Market status : ${{ steps.oracle.outputs.status }}"
          echo "Safe to execute: ${{ steps.oracle.outputs.safe_to_execute }}"
          echo "Receipt ID    : ${{ steps.oracle.outputs.receipt_id }}"
          echo "Expires at    : ${{ steps.oracle.outputs.expires_at }}"

  # This job only runs if the market check passes
  execute-trading-operations:
    runs-on: ubuntu-latest
    needs: check-market   # gates on the oracle check
    name: Execute trading operations

    steps:
      - uses: actions/checkout@v4

      - name: Run trading strategy
        run: |
          echo "Market is verified OPEN — executing strategy…"
          # python src/strategy.py
          # or your trading code here

  # Example: check multiple exchanges for a global strategy.
  #
  # These three markets are never simultaneously open (NYSE is EST, LSE is GMT,
  # Tokyo is JST), so the correct pattern is fail-closed per-market: check each
  # exchange independently, then execute only for the markets that are currently
  # OPEN. HALTED or UNKNOWN still fail the step — that's the safety guarantee.
  check-global-markets:
    runs-on: ubuntu-latest
    name: Verify all exchanges for global strategy

    steps:
      # allow_closed defaults to true — CLOSED does not fail the step.
      # HALTED and UNKNOWN still cause the action to exit non-zero (fail-closed).
      - name: Check NYSE (XNYS)
        id: nyse
        uses: LembaGang/headless-oracle-agent-demo@v1
        with:
          mic: XNYS

      - name: Check LSE (XLON)
        id: lse
        uses: LembaGang/headless-oracle-agent-demo@v1
        with:
          mic: XLON

      - name: Check Tokyo (XJPX)
        id: tse
        uses: LembaGang/headless-oracle-agent-demo@v1
        with:
          mic: XJPX

      # Execute strategy only for the markets that are currently OPEN.
      # Markets that are CLOSED are skipped — not an error, just outside hours.
      # Any HALTED or UNKNOWN result fails the oracle step above before reaching here.
      - name: Execute NYSE strategy (if OPEN)
        if: steps.nyse.outputs.status == 'OPEN'
        run: |
          echo "NYSE (XNYS) is OPEN — executing US equity strategy…"
          # python src/strategy_us.py

      - name: Execute LSE strategy (if OPEN)
        if: steps.lse.outputs.status == 'OPEN'
        run: |
          echo "LSE (XLON) is OPEN — executing UK equity strategy…"
          # python src/strategy_uk.py

      - name: Execute Tokyo strategy (if OPEN)
        if: steps.tse.outputs.status == 'OPEN'
        run: |
          echo "Tokyo (XJPX) is OPEN — executing JP equity strategy…"
          # python src/strategy_jp.py

      - name: Report which markets were active
        run: |
          echo "NYSE  (XNYS): ${{ steps.nyse.outputs.status }}"
          echo "LSE   (XLON): ${{ steps.lse.outputs.status }}"
          echo "Tokyo (XJPX): ${{ steps.tse.outputs.status }}"
